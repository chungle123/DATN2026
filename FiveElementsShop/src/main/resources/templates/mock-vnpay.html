<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cổng thanh toán Mô Phỏng (Mock VNPAY)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f8;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background-color: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }
        .header {
            margin-bottom: 25px;
        }
        .header h2 {
            margin: 0;
            color: #004a9c;
            font-size: 24px;
        }
        .header p {
            color: #666;
            margin-top: 5px;
            font-size: 14px;
        }
        .info-box {
            background-color: #f9f9fc;
            border: 1px solid #e0e4e8;
            border-radius: 6px;
            padding: 15px;
            text-align: left;
            margin-bottom: 25px;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        .info-row:last-child {
            margin-bottom: 0;
        }
        .info-label {
            color: #555;
            font-weight: 500;
        }
        .info-value {
            color: #111;
            font-weight: bold;
        }
        .amount {
            color: #e5002d;
            font-size: 18px;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 15px;
            transition: all 0.3s;
        }
        .btn-success {
            background-color: #004a9c;
            color: white;
        }
        .btn-success:hover {
            background-color: #003672;
        }
        .btn-danger {
            background-color: #f8dbdb;
            color: #e5002d;
        }
        .btn-danger:hover {
            background-color: #f1c7c7;
        }
        .warning-text {
            font-size: 12px;
            color: #888;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>CỔNG THANH TOÁN MÔ PHỎNG</h2>
        <p>Môi trường giả lập VNPAY (Local Sandbox)</p>
    </div>

    <div class="info-box">
        <div class="info-row">
            <span class="info-label">Mã giao dịch:</span>
            <span class="info-value" th:text="${txnRef}"></span>
        </div>
        <div class="info-row">
            <span class="info-label">Thông tin:</span>
            <span class="info-value" th:text="${orderInfo}"></span>
        </div>
        <div class="info-row">
            <span class="info-label">Số tiền cần thanh toán:</span>
            <span class="info-value amount" th:text="${#numbers.formatDecimal(amount, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'"></span>
        </div>
    </div>

    <form action="/mock-vnpay/process" method="POST">
        <!-- Pass all original params as hidden inputs -->
        <input type="hidden" th:each="paramMap : ${vnp_Params}" th:name="${paramMap.key}" th:value="${paramMap.value}" />
        
        <button type="submit" name="action" value="success" class="btn btn-success">
            💳 Xác nhận Thanh toán (Mã 00)
        </button>
        <button type="submit" name="action" value="fail" class="btn btn-danger">
            ❌ Hủy giao dịch (Mã 24)
        </button>
    </form>

    <div class="warning-text">
        Đây là giao diện mô phỏng được tạo bởi Antigravity. Sẽ không có số dư thực nào bị trừ khỏi thẻ của bạn.
    </div>
</div>

</body>
</html>
